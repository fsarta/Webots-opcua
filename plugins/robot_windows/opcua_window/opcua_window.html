<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="opcua_window.css">
    <title>OPC-UA Supervisor</title>
</head>
<body>
    <div class="container">
        <h2>OPC-UA Configuration Panel</h2>
        
        <!-- Connection Section -->
        <div class="section-box">
            <div class="connection-panel">
                <label for="ip-input">Server:</label>
                <input type="text" id="ip-input" value="opc.tcp://127.0.0.1:4840" placeholder="opc.tcp://IP:PORT">
                <label for="pub-input">Pub. Int. (ms):</label>
                <input type="number" id="pub-input" value="10" step="5" min="5" style="width: 60px;">
                <button id="connect-btn">Connect</button>
                <button id="disconnect-btn" class="btn-unmap" style="display: none;">Disconnect</button>
            </div>
            <div id="status-indicator" class="status disconnected">Disconnected</div>
            
            <div class="config-actions" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: flex; gap: 10px;">
                <button id="save-btn" class="btn-secondary">💾 Save Config</button>
                <button id="load-btn" class="btn-secondary">📂 Load Config</button>
            </div>
        </div>

        <!-- Active Mappings Table -->
        <div class="section-box" id="active-mappings-section" style="display: none;">
            <h3>Active Mappings</h3>
            <table class="mappings-table">
                <thead>
                    <tr>
                        <th>OPC Node</th>
                        <th>Direction</th>
                        <th>Webots Target</th>
                        <th>Param</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="mappings-table-body">
                </tbody>
            </table>
        </div>

        <!-- Tags & Mapping Section -->
        <div class="section-box">
            <h3>Discovered Tags & Mapping</h3>
            <div class="tags-panel" id="tags-list">
                <p class="placeholder-text">Connect to a server to discover tags...</p>
            </div>
        </div>
    </div>
    
    <script type="module" src="opcua_window.js"></script>
</body>
</html>
